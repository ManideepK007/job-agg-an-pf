<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a New Job | SkillSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .form-container { 
            max-width: 700px; 
            margin: 40px auto; 
            background: white; 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { color: #333; margin-top: 0; border-bottom: 2px solid #007bff; display: inline-block; padding-bottom: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-family: inherit; 
            box-sizing: border-box; /* Important for padding */
        }
        textarea { height: 150px; resize: vertical; }
        .btn-submit { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 14px 25px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1rem; 
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Post a New Job Opening</h2>
    <p style="color: #777; margin-bottom: 25px;">Fill in the details below to reach thousands of talented seekers.</p>

    <form action="{{ url_for('job_bp.create_job') }}" method="POST">
        <div class="form-group">
            <label for="title">Job Title</label>
            <input type="text" name="title" id="title" placeholder="e.g. Junior Python Developer" required>
        </div>

        <div class="form-group">
            <label for="company">Company Name</label>
            <input type="text" name="company" id="company" placeholder="e.g. SkillSync Tech" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label for="location">Location</label>
                <select name="location" id="location">
                    <option value="Remote">Remote</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Bangalore">Bangalore</option>
                    <option value="Mumbai">Mumbai</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="salary">Salary Range</label>
                <input type="text" name="salary" id="salary" placeholder="e.g. 5-8 LPA">
            </div>
        </div>

        <div class="form-group">
            <label for="skills">Skills Required (Comma separated)</label>
            <input type="text" name="skills" id="skills" placeholder="Python, Flask, MongoDB, AWS">
        </div>

        <div class="form-group">
            <label for="description">Job Description</label>
            <textarea name="description" id="description" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Publish Job Listing</button>
    </form>

    <a href="{{ url_for('job_bp.explore') }}" class="back-link">← Back to Job Feed</a>
</div>

</body>
</html>
